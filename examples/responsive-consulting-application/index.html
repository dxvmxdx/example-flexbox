<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>responsive consulting application</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>
          퍼블리싱 학습의 새로운 <em>패러다임!</em><br />
          신속하게 <em>코딩웍스 간편 상담</em>을 신청하실 수 있습니다.
        </h1>
        <p>
          상담 내용에 따라 비용과 절차에 관련하여 전화 또는 이메일로 신속하게
          상담해 드립니다.
        </p>
      </header>
      <form>
        <div class="row">
          <div class="field">
            <label class="required" for="name">이름</label>
            <input
              type="text"
              id="name"
              placeholder="이름을 입력하세요."
              required
            />
          </div>
          <div class="field">
            <label class="required" for="email">이메일</label>
            <input
              type="email"
              id="email"
              placeholder="이메일을 입력하세요."
              required
            />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label class="required" for="phone">연락처</label>
            <input
              type="text"
              id="phone"
              placeholder="연락처를 입력하세요."
              required
            />
          </div>
          <div class="field">
            <label class="required" for="category">상담구분</label>
            <select name="" id="category">
              <option value="">선택하세요</option>
              <option value="online">온라인</option>
              <option value="offline">오프라인</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label class="required" for="content">상담내용</label>
            <textarea
              name=""
              id="content"
              rows="5"
              placeholder="상담 접수가 이루어진 후 24시간 내에 연락드리겠습니다. 감사합니다."
              required
            ></textarea>
          </div>
        </div>
        <div class="policy">
          <h4>개인정보 취급방침 (필수)</h4>
          <iframe src="./policy.html" frameborder="0"></iframe>
          <div>
            <input type="checkbox" name="" id="policy" required />
            <label for="policy"
              >개인정보 취급방침을 읽었으며 이에 동의합니다.</label
            >
          </div>
        </div>
        <div class="apply">
          <button class="applyBtn">상담신청</button>
        </div>
      </form>
    </div>
  </body>
</html>
